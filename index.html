<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Senior full-stack and AI engineer based in Japan, building production systems for clients worldwide." />
    <title>Full-Stack & AI Engineer — Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        try {
          var k = "theme";
          var s = localStorage.getItem(k);
          var m = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var r = s === "dark" || ((!s || s === "system") && m) ? "dark" : "light";
          var d = document.documentElement;
          d.classList.add(r);
          d.style.colorScheme = r;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full flex flex-col bg-background text-foreground antialiased">
    <div id="root" class="contents"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
